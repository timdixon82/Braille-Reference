  #         mkdir _site
  #         rsync -av \
  #           --exclude='_site' \
  #           --exclude='node_modules' \
  #           --exclude='.github' \
  #           --exclude='docs' \
  #           --exclude='package.json' \
  #           --exclude='package-lock.json' \
  #           --exclude='.eslintrc.js' \
  #           --exclude='.stylelintrc.json' \
  #           . _site/
  #         # Adjust the exclude list to match files your project must not serve.
