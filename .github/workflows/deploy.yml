# Deploy to GitHub Pages.
# Runs on every push to main and on manual dispatch.
#
# THIS IS THE TEAM STANDARD for deploying a static site to GitHub Pages.
# See docs/patterns/github-pages-deploy.md for the full standard.
#
# Activation (one-time, per repo): GitHub > Settings > Pages > Build and
# deployment > Source > "GitHub Actions" (NOT "Deploy from a branch").
# Equivalently, set the Pages build_type to "workflow" via the API.
#
# Action SHAs are pinned to FULL 40-character commit SHAs. Never use a
# shortened SHA: GitHub no longer resolves them and the deploy will fail
# (this caused a silent stale-deploy on the Image Colour Contrast Checker).
# The version tag is in the trailing comment; update SHAs via Dependabot.
#
# ── CHOOSE ONE VARIANT ────────────────────────────────────────────────────────
#
# BUNDLED projects: a build step emits an output folder (e.g. dist).
#   - Keep the BUNDLED JOB section below (the default).
#   - Delete or comment out the UNBUNDLED JOB section.
#
# UNBUNDLED static projects: files served straight from the repo root, no
# build step (e.g. SWOT Builder). An "Assemble site" step copies runtime
# files into _site, excluding node_modules / .github / docs / config files.
#   - Keep the UNBUNDLED JOB section below.
#   - Delete or comment out the BUNDLED JOB section.
#
# See docs/patterns/github-pages-deploy.md for full guidance, SHAs, and
# notes on post-merge live-site verification.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time. In-progress deploy is cancelled if a new push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  # ── BUNDLED JOB ─────────────────────────────────────────────────────────────
  # Use for projects with an npm build step that emits a folder (e.g. dist).
  # DELETE this job if your project is UNBUNDLED.
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # --if-present no-ops: this project's package.json is for tooling
        # (lint, test) only, with no "build" script (see the no-build ADR
        # in docs/decisions/). Without --if-present, npm exits non-zero
        # with "Missing script: build" and the deploy fails.
        run: npm run build --if-present

      - name: Assemble the deploy artifact
        # This project has no build step, so dist/ never gets created.
        # Uploading the repository root as-is would publish node_modules
        # (npm ci already ran above), tooling config, docs, and agent
        # working files, so this assembles a _site/ folder with the
        # runtime files only.
        #
        # This is a fail-safe ALLOW-list, not a deny-list: only paths
        # matching an explicit --include line below are copied into
        # _site/. Everything else is excluded by the trailing
        # --exclude='*'. A file nobody thought to exclude is therefore
        # NOT published by default — the opposite of a deny-list, where a
        # forgotten exclude ships an unknown file to a public Pages URL.
        # This project's runtime is index.html, assets/, and js/. The
        # *.test.js exclude drops js/braille-data.test.js — a unit test
        # file that lives alongside the runtime module but is never
        # loaded by index.html, so it has no place on the public site.
        #
        # Every include below (other than the '*/' descend-only pattern)
        # carries a leading '/' to anchor it to the repo root. An rsync
        # include that contains a '/' but has NO leading '/' is NOT
        # anchored — it matches at any depth, not just the root. Because
        # npm ci runs before this step, an unanchored 'js/***' would also
        # match nested node_modules paths, silently publishing
        # node_modules internals to the public site.
        id: artifact
        run: |
          if [ -d dist ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
          else
            mkdir _site
            # The allow-listed paths below (assets/, js/, index.html) are
            # published to the public site: never put a secret or other
            # non-public file in any of them.
            rsync -a --prune-empty-dirs --safe-links \
                     --include='/index.html' \
                     --include='/assets/***' \
                     --exclude='*.test.js' \
                     --include='/js/***' \
                     --include='*/' \
                     --exclude='*' \
                     ./ _site/
            echo "path=_site" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: ${{ steps.artifact.outputs.path }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0


  # ── UNBUNDLED JOB ───────────────────────────────────────────────────────────
  # Use for projects with no build step — files served straight from the repo.
  # Reference implementation: SWOT Builder.
  # DELETE or COMMENT OUT this job if your project is BUNDLED.
