# Playwright functional tests.
#
# Runs the end-to-end test suite in tests/e2e/ against index.html served by a
# local Python HTTP server on port 8080. The server is managed by Playwright's
# webServer option in playwright.config.js, so no separate server start step
# is needed here.
#
# Relationship to accessibility.yml: this workflow covers functional flows.
# accessibility.yml covers WCAG conformance via Pa11y and axe-core. Both must
# be green before a PR merges.
#
# Action versions were verified against GitHub and pinned to commit SHAs
# on 2026-06-02. The version tag is shown in the trailing comment. To
# update an action, change the SHA and the comment together.

name: Playwright
on:
  pull_request:

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browser binaries
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        # On a cache hit, install only the system-level library dependencies.
        # On a cache miss, install the full browser binaries and dependencies.
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        # Upload the HTML report as an artifact on failure so it can be
        # inspected without re-running the tests.
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
